map $request_method $post_limit_key {
  default "";
  POST $binary_remote_addr;
}

map $request_method $non_post_limit_key {
  default $binary_remote_addr;
  POST "";
}

limit_req_zone $post_limit_key zone=post_per_ip:10m rate=5r/m;
limit_req_zone $non_post_limit_key zone=non_post_per_ip:10m rate=60r/m;

server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  limit_req_status 429;
  limit_req zone=non_post_per_ip;
  limit_req zone=post_per_ip;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
