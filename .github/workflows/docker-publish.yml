name: Library CI/CD

on:
  push:

jobs:
  frontend_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: npm ci
        working-directory: node-postgres

      - name: Run backend tests
        run: npm test
        working-directory: node-postgres

  build_and_push:
    runs-on: ubuntu-latest
    needs:
      - frontend_checks
      - backend_tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./node-postgres
          file: ./node-postgres/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/library_prksp_backend:latest
            ${{ secrets.DOCKER_USERNAME }}/library_prksp_backend:${{ github.sha }}
